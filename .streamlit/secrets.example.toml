# Copy these values into Streamlit Community Cloud secrets.
# Do not commit your real .streamlit/secrets.toml file.

openai_api_key = "YOUR_OPENAI_OR_GROQ_KEY_HERE"

# Optional, only needed when using Groq/OpenAI-compatible providers.
# For OpenAI, leave this out.
# openai_base_url = "https://api.groq.com/openai/v1"

model_name = "gpt-4o-mini"

# For online studies, use a hosted Postgres/Supabase database.
# Locally, the app falls back to sqlite:///interactions.db if this is missing.
study_database_url = "postgresql://USER:PASSWORD@HOST:PORT/DATABASE"
